<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinFlow | Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg-main, #f1f5ff);
      color: var(--text-main, #10182b);
      font-family: "Inter", sans-serif;
      padding: 20px;
    }
    .auth-box {
      width: min(420px, 100%);
      background: var(--surface, #fff);
      border: 1px solid var(--line, #e1e8f5);
      border-radius: 16px;
      box-shadow: var(--shadow-card, 0 18px 40px rgba(20,33,60,.09));
      padding: 24px;
    }
    .auth-title {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary, #10182b);
    }
    .auth-subtitle {
      margin: 6px 0 16px;
      color: var(--text-muted, #667796);
      font-size: .92rem;
    }
    .brand-lockup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    /* Logo mark — replaces the old gradient badge */
    .brand-badge {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      overflow: hidden;
    }
    .brand-copy {
      text-align: center;
    }
    .form-label {
      font-size: .9rem;
      font-weight: 600;
      margin-bottom: 6px;
      display: inline-block;
    }
    .form-control {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid var(--line, #e1e8f5);
      padding: 0 12px;
      box-sizing: border-box;
      font: inherit;
      background: var(--surface-soft, #f8fbff);
      color: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary, #3f6ef6);
      box-shadow: 0 0 0 4px rgba(63, 110, 246, 0.15);
    }
    /* Field-level validation error state */
    .form-control.field-invalid {
      border-color: #d94e63;
      box-shadow: 0 0 0 3px rgba(217, 78, 99, 0.14);
    }
    .inline-field-error {
      display: block;
      font-size: .8rem;
      color: #d94e63;
      margin-top: 4px;
    }
    .auth-btn {
      width: 100%;
      border: 0;
      min-height: 46px;
      border-radius: 12px;
      font-weight: 700;
      color: #fff;
      margin-top: 18px;
      background: linear-gradient(130deg, var(--primary, #3f6ef6), var(--primary-2, #705eff));
      cursor: pointer;
      transition: opacity .15s;
    }
    .auth-btn:hover { opacity: .9; }
    .auth-meta {
      margin: 12px 0 0;
      color: var(--text-muted, #667796);
      font-size: .9rem;
    }
    .auth-meta a {
      color: var(--primary, #3f6ef6);
      text-decoration: none;
      font-weight: 700;
    }
    .auth-msg {
      min-height: 20px;
      font-size: .88rem;
      margin-top: 10px;
    }
    .auth-msg.error   { color: #d94e63; }
    .auth-msg.success { color: #0f9a75; }
    .auth-hint {
      margin: 10px 0 0;
      font-size: .82rem;
      color: var(--text-muted, #667796);
    }
    .auth-page {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .brand-top {
      width: min(420px, 100%);
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body data-page="login">
  <main class="auth-page">
    <div class="brand-top">
      <div class="brand-lockup" aria-label="FinFlow brand">

        <!-- FinFlow Logo Mark (replaces the old gradient FF badge) -->
        <div class="brand-badge" aria-hidden="true">
          <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <clipPath id="lmc">
                <rect width="40" height="40" rx="12"/>
              </clipPath>
            </defs>
            <rect width="40" height="40" rx="12" fill="#085041"/>
            <g clip-path="url(#lmc)" fill="none" stroke-linecap="round">
              <path d="M-1 37C9 32,19 24,26 17S37 9,42 6"   stroke="white" stroke-width="4"   opacity="0.18"/>
              <path d="M-1 28C9 23,19 16,26 10S37 3,43 0"   stroke="white" stroke-width="3"   opacity="0.48"/>
              <path d="M2 39C12 33,22 25,28 18S38 10,44 7"  stroke="white" stroke-width="2.2" opacity="0.85"/>
              <circle cx="36" cy="7" r="3" fill="white" opacity="0.92"/>
              <circle cx="36" cy="7" r="1.3" fill="#085041" opacity="0.7"/>
            </g>
          </svg>
        </div>

        <div class="brand-copy">
          <h2 class="auth-title">FinFlow</h2>
          <p class="auth-subtitle">Sign in to access your dashboard</p>
        </div>
      </div>
    </div>

    <section class="auth-box">
      <form id="loginForm" novalidate>
        <div>
          <label for="loginEmail" class="form-label">Email</label>
          <input id="loginEmail" class="form-control" type="email" placeholder="you@example.com" required />
        </div>

        <div style="margin-top:12px;">
          <label for="loginPassword" class="form-label">Password</label>
          <input id="loginPassword" class="form-control" type="password" placeholder="Enter password" required />
        </div>

        <button type="submit" class="auth-btn">Login</button>
        <p class="auth-hint">Demo: demo@finflow.com / Demo@123</p>
        <p id="loginMessage" class="auth-msg"></p>
      </form>

      <p class="auth-meta">No account? <a href="signup.html">Create one</a></p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
