<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinFlow | Sign Up</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg-main, #f1f5ff);
      color: var(--text-main, #10182b);
      font-family: "Inter", sans-serif;
      padding: 20px;
    }
    .auth-page {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .brand-top {
      width: min(440px, 100%);
      display: flex;
      justify-content: center;
    }
    .brand-lockup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .brand-badge {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      overflow: hidden;
    }
    .auth-box {
      width: min(440px, 100%);
      background: var(--surface, #fff);
      border: 1px solid var(--line, #e1e8f5);
      border-radius: 16px;
      box-shadow: var(--shadow-card, 0 18px 40px rgba(20,33,60,.09));
      padding: 24px;
    }
    .auth-title {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 800;
    }
    .auth-subtitle {
      margin: 6px 0 18px;
      color: var(--text-muted, #667796);
      font-size: .92rem;
    }
    .form-label {
      font-size: .9rem;
      font-weight: 600;
      margin-bottom: 6px;
      display: inline-block;
    }
    .form-control {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid var(--line, #e1e8f5);
      padding: 0 12px;
      box-sizing: border-box;
      font: inherit;
      background: var(--surface-soft, #f8fbff);
      color: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary, #3f6ef6);
      box-shadow: 0 0 0 4px rgba(63, 110, 246, 0.15);
    }
    /* Field-level validation error state */
    .form-control.field-invalid {
      border-color: #d94e63;
      box-shadow: 0 0 0 3px rgba(217, 78, 99, 0.14);
    }
    .inline-field-error {
      display: block;
      font-size: .8rem;
      color: #d94e63;
      margin-top: 4px;
    }
    .password-hint {
      font-size: .78rem;
      color: var(--text-muted, #667796);
      margin-top: 4px;
    }
    .auth-btn {
      width: 100%;
      border: 0;
      min-height: 46px;
      border-radius: 12px;
      font-weight: 700;
      color: #fff;
      margin-top: 18px;
      background: linear-gradient(130deg, var(--primary, #3f6ef6), var(--primary-2, #705eff));
      cursor: pointer;
      transition: opacity .15s;
    }
    .auth-btn:hover { opacity: .9; }
    .auth-meta {
      margin: 12px 0 0;
      color: var(--text-muted, #667796);
      font-size: .9rem;
    }
    .auth-meta a {
      color: var(--primary, #3f6ef6);
      text-decoration: none;
      font-weight: 700;
    }
    .auth-msg {
      min-height: 20px;
      font-size: .88rem;
      margin-top: 10px;
    }
    .auth-msg.error   { color: #d94e63; }
    .auth-msg.success { color: #0f9a75; }
    .brand-copy { text-align: center; }
  </style>
</head>
<body data-page="signup">
  <main class="auth-page">

    <!-- Logo — matches login page layout -->
    <div class="brand-top">
      <div class="brand-lockup" aria-label="FinFlow brand">
        <div class="brand-badge" aria-hidden="true">
          <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <clipPath id="smc">
                <rect width="40" height="40" rx="12"/>
              </clipPath>
            </defs>
            <rect width="40" height="40" rx="12" fill="#085041"/>
            <g clip-path="url(#smc)" fill="none" stroke-linecap="round">
              <path d="M-1 37C9 32,19 24,26 17S37 9,42 6"   stroke="white" stroke-width="4"   opacity="0.18"/>
              <path d="M-1 28C9 23,19 16,26 10S37 3,43 0"   stroke="white" stroke-width="3"   opacity="0.48"/>
              <path d="M2 39C12 33,22 25,28 18S38 10,44 7"  stroke="white" stroke-width="2.2" opacity="0.85"/>
              <circle cx="36" cy="7" r="3"   fill="white"   opacity="0.92"/>
              <circle cx="36" cy="7" r="1.3" fill="#085041" opacity="0.7"/>
            </g>
          </svg>
        </div>
        <div class="brand-copy">
          <h2 class="auth-title" style="font-size:1.35rem;margin:0;letter-spacing:-0.03em;">FinFlow</h2>
          <p class="auth-subtitle" style="margin:4px 0 0;">Create your account in seconds</p>
        </div>
      </div>
    </div>

    <section class="auth-box">
      <h1 class="auth-title">Sign Up</h1>
      <p class="auth-subtitle">Start tracking your finances today</p>

      <form id="signupForm" novalidate>
        <div>
          <label for="signupName" class="form-label">Full Name</label>
          <input id="signupName" class="form-control" type="text" placeholder="Your name" required />
        </div>

        <div style="margin-top:12px;">
          <label for="signupEmail" class="form-label">Email</label>
          <input id="signupEmail" class="form-control" type="email" placeholder="you@example.com" required />
        </div>

        <div style="margin-top:12px;">
          <label for="signupPassword" class="form-label">Password</label>
          <input id="signupPassword" class="form-control" type="password" placeholder="At least 6 characters" required />
          <span class="password-hint">Must be 6+ characters and include at least one number.</span>
        </div>

        <!-- Confirm password — new field for safety -->
        <div style="margin-top:12px;">
          <label for="signupConfirm" class="form-label">Confirm Password</label>
          <input id="signupConfirm" class="form-control" type="password" placeholder="Re-enter your password" required />
        </div>

        <button type="submit" class="auth-btn">Create Account</button>
        <p id="signupMessage" class="auth-msg"></p>
      </form>

      <p class="auth-meta">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
